name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        # 20.19.0 is the exact floor declared in engines; 22 and 24 track the
        # current and next active LTS lines.
        node: ['20.19.0', '22', '24']
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v5
        with:
          node-version: ${{ matrix.node }}
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm check
      - run: pnpm test
      - run: pnpm build

      # Build, pack, install and smoke the actual published tarball so packaging
      # regressions (missing dist, broken bin, bad shebang) fail CI, not users.
      # bash is available on every runner, including Windows, so one script works.
      - name: Pack and smoke-test the tarball
        shell: bash
        run: |
          set -euo pipefail
          pnpm pack
          tarball="$(ls ai-canon-*.tgz)"
          echo "Installing $tarball"
          npm install -g "./$tarball"
          ai-canon --version
          ai-canon --help
          work="$(mktemp -d)"
          ( cd "$work" && ai-canon init canon --repo smoke )
          test -f "$work/canon.json"
